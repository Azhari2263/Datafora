<!DOCTYPE html>
<html lang="id">

<head>

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">

<body>
    <div class="blob bg-teal-200 w-96 h-96 -top-20 -left-20"></div>

    <main class="glass-card text-center mx-4">

        <div class="flex flex-col items-center gap-6">
            <div class="loader-ring"></div>
            <div class="space-y-1">
                <p class="text-sm font-bold text-teal-800 tracking-wider uppercase">Memuat Visualisasi Data...</p>
