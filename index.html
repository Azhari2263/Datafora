<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Datafora...</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #007074;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(50px, 100px) scale(1.2);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-radius: 2.5rem;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 400px;
        }

        .datafora-logo {
            font-family: 'Fredoka', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
        }

        .char {
            display: inline-block;
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.15));
        }

        .loader-ring {
            width: 52px;
            height: 52px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* FOOTER TETAP (Ukuran Terkunci) */
        .marquee-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            /* Tinggi dikunci agar tidak berubah */
            background: rgba(0, 112, 116, 0.95);
            color: white;
            display: flex;
            align-items: center;
            /* Teks lurus di tengah secara vertikal */
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.2);
            z-index: 50;
        }

        .marquee-container {
            display: flex;
            width: fit-content;
            animation: scroll 25s linear infinite;
            visibility: hidden;
            /* Teks sembunyi dulu, tapi container sudah punya tinggi */
        }

        .marquee-text {
            font-size: 0.95rem;
            font-weight: 500;
            padding-right: 60px;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>
    <div class="blob bg-teal-200 w-96 h-96 -top-20 -left-20"></div>
    <div class="blob bg-purple-200 w-80 h-80 -bottom-20 -right-20"></div>

    <main class="glass-card text-center mx-4">
        <div class="datafora-logo mb-8">
            <span class="char text-[#007074]">D</span>
            <span class="char text-[#007074]">A</span>
            <span class="char text-[#007074]">T</span>
            <span class="char text-[#007074]">A</span>
            <span class="char text-[#b96a96]">F</span>
            <span class="char text-[#b96a96]">O</span>
            <span class="char text-[#d112cc]">R</span>
            <span class="char text-[#d112cc]">A</span>
        </div>

        <div class="flex flex-col items-center gap-6">
            <div class="loader-ring"></div>
            <div class="space-y-1">
                <p class="text-sm font-bold text-teal-800 tracking-wider uppercase">Memuat Visualisasi Data...</p>
                <p class="text-xs text-slate-500 font-medium">Mohon Tunggu Sebentar!</p>
            </div>
        </div>
    </main>

    <footer class="marquee-footer">
        <div class="marquee-container" id="marquee-content">
        </div>
    </footer>

    <script>
        const GLIDE_URL = "https://datafora.glide.page/dl/17171d";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSu9zeVzya_QANdJwzfBDg1q3z-wghzbmR5vVeLuDTahTw9UaRLPWBY_LO85-WEUjIiw/exec";

        function getIndoDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('id-ID', options);
        }

        async function initRedirect() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();

                // Gabungkan teks informasi
                const fullText = `Selamat Datang di Datafora BPS Kota Singkawang • Hari ${getIndoDate()} • Total Kunjungan: ${data.total} kali • `;

                const container = document.getElementById('marquee-content');

                // Isi teks ganda agar looping mulus (infinite)
                container.innerHTML = `
                    <div class="marquee-text">${fullText}</div>
                    <div class="marquee-text">${fullText}</div>
                `;

                // Tampilkan teks (container tetap pada tinggi 50px)
                container.style.visibility = 'visible';

                // Jeda redirect agar user bisa melihat data
                setTimeout(() => {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.8s ease';
                    setTimeout(() => { window.location.href = GLIDE_URL; }, 800);
                }, 6500);

            } catch (error) {
                console.error("Fetch error:", error);
                const container = document.getElementById('marquee-content');
                const failText = `Selamat Datang di Datafora BPS Kota Singkawang • ${getIndoDate()} • `;
                container.innerHTML = `<div class="marquee-text">${failText}</div><div class="marquee-text">${failText}</div>`;
                container.style.visibility = 'visible';

                setTimeout(() => { window.location.href = GLIDE_URL; }, 3000);
            }
        }

        window.onload = initRedirect;
    </script>
</body>

</html>
